<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seal Verification API - Swagger UI</title>
    <link rel="stylesheet" type="text/css" href="https://cdnjs.cloudflare.com/ajax/libs/swagger-ui/4.15.5/swagger-ui.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: sans-serif;
            background-color: #fafafa;
        }
        
        .topbar {
            background-color: #0d1117;
            color: white;
            padding: 15px 20px;
            text-align: center;
        }
        
        .topbar h1 {
            font-size: 24px;
            margin: 0;
        }
        
        .topbar p {
            font-size: 14px;
            color: #ccc;
            margin-top: 5px;
        }
        
        #swagger-ui {
            max-width: 1200px;
            margin: 20px auto;
        }
    </style>
</head>
<body>
    <div class="topbar">
        <h1>🔐 Seal Verification API</h1>
        <p>Interactive API Testing with Swagger UI</p>
    </div>
    
    <div id="swagger-ui"></div>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/swagger-ui/4.15.5/swagger-ui.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/swagger-ui/4.15.5/swagger-ui-bundle.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/swagger-ui/4.15.5/swagger-ui-standalone-preset.min.js"></script>
    
    <script>
        window.onload = function() {
            // Build a system
            const ui = SwaggerUIBundle({
                url: "http://localhost:8000/openapi.json",
                dom_id: '#swagger-ui',
                deepLinking: true,
                presets: [
                    SwaggerUIBundle.presets.apis,
                    SwaggerUIStandalonePreset
                ],
                plugins: [
                    SwaggerUIBundle.plugins.DownloadUrl
                ],
                layout: "StandaloneLayout",
                defaultModelsExpandDepth: 2,
                defaultModelExpandDepth: 2,
                onComplete: function() {
                    console.log("Swagger UI loaded successfully");
                }
            });
            
            window.ui = ui;
        };
    </script>
</body>
</html>
